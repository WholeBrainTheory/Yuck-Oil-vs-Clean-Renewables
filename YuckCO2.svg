 <dc:description>A depiction of a cloud of harmful waste CO2, Carbon Dioxide, with a disgust expression and the text YUCK CO2. The extraction and use of petroleum products for fuel releases poisons into our environment and harms us directly and indirectly. CO2 traps heat, warming the environment beyond survivability.</dc:description>

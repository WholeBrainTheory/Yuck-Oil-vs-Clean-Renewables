A representation of the harmful waste product Carbon Dioxide, CO2.
A depiction of a cloud of CO2 with a disgust expression and the text YUCK CO2.
The extraction and use of petroleum products for fuel releases poisons into our environment and harms us directly and indirectly. CO2 is a waste product that is accumulating faster than we can be absorbed and must be managed.-->

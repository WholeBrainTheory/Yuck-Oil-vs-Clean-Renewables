This work is marked CC0 1.0 Universal. To view a copy of this mark, visit https://creativecommons.org/publicdomain/zero/1.0/ 
Wind blowing a wind turbine to represent clean capture of wind energy.
A depiction of wind energy capture as a happy cloud blowing wind through a turning wind turbine.
The extraction and use of petroleum products for fuel releases poisons into our environment and harms us directly and indirectly. Wind energy is abundant, clean, and cheap and should be used in place of burning petroleum products for energy.-->

 <dc:description>A depiction of collection of solar energy from the sun with a happy face, solar panels, and the text Sweet Solar. The extraction and use of petroleum products for fuel releases poisons into our environment and harms us directly and indirectly. Clean, cheap, abundant solar energy should be used instead.</dc:description>
